# This workflow builds/tests with Maven and publishes to GitHub Packages when a release is created.
# It expects pom.xml to contain:
# - distributionManagement/repository/id = github (matching setup-java server-id)
# - distributionManagement/repository/url = https://maven.pkg.github.com/${env.GITHUB_REPOSITORY}
# - coordinates groupId/artifactId = org/exemploTesouraria

name: Maven Package

on:
  release:
    types: [created]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }} # location for the settings.xml file

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Confirm Maven coordinates
      run: |
        GROUP_ID=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.groupId)
        ARTIFACT_ID=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.artifactId)
        test "$GROUP_ID" = "org"
        test "$ARTIFACT_ID" = "exemploTesouraria"

    - name: Publish to GitHub Packages Apache Maven
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
